name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The project itself has zero runtime dependencies, but we still rely
      # on the stdlib `unittest` runner. No `pip install` step is needed.
      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: |
          python -m unittest discover -s tests

  lint-type:
    name: lint and type-check
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev tools
        run: |
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: |
          python -m ruff check src/

      - name: Mypy
        run: |
          python -m mypy --strict src/protoagi/

  memory-eval-gate:
    name: memory-eval regression gate
    runs-on: ubuntu-latest
    needs: [tests, lint-type]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Capture latest report
        env:
          PYTHONPATH: src
        run: |
          mkdir -p runs
          python -m protoagi memory-eval --json > runs/memory-eval-ci.json
          cat runs/memory-eval-ci.json

      - name: Compare against baseline
        run: |
          python scripts/check_baseline.py memory-eval \
            --report runs/memory-eval-ci.json \
            --baseline runs/memory-eval-baseline.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memory-eval-report
          path: runs/memory-eval-ci.json
          retention-days: 14

  bench-tools-gate:
    # The bench-tools regression gate needs a running llama-server, which
    # CI does not have. We still exercise the placeholder baseline so the
    # check_baseline script itself stays green; a non-placeholder run is
    # only enabled when the runner exposes a model endpoint via the
    # `PROTOAGI_BASE_URL` env var.
    name: bench-tools gate (placeholder)
    runs-on: ubuntu-latest
    needs: [tests, lint-type]
    steps:
      - uses: actions/checkout@v4

      - name: Verify placeholder baseline parses
        run: |
          python -c "import json,pathlib; data=json.loads(pathlib.Path('runs/bench-tools-baseline.json').read_text()); assert data.get('status') in ('unverified', None) or 'canonical_path_hint' in data, data"

      - name: Run gate against placeholder
        run: |
          python scripts/check_baseline.py bench-tools \
            --report runs/bench-tools-baseline.json \
            --baseline runs/bench-tools-baseline.json
